<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polar Plot</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body class="graph-page">
  <div class="graph-wrapper">
    <div class="graph-container" id="plot"></div>
  </div>
  <script>
    const theta = [];
    for (let i = 0; i <= 2 * Math.PI; i += 0.02) {
      theta.push(i);
    }
    const r = theta.map(t => 2 * Math.cos(3 * t));

    Plotly.newPlot('plot', [{
      r, theta,
      type: 'scatterpolar',
      mode: 'lines',
      name: 'r = 2cos(3θ)',
      line: { width: 2.5, color: '#34d399' }
    }], {
      margin: { t: 40, r: 40, b: 40, l: 40 },
      polar: {
        radialaxis: { tickfont: { size: 10, color: '#e8e8e8' }, gridcolor: '#404040' },
        angularaxis: { tickfont: { size: 10, color: '#e8e8e8' }, gridcolor: '#404040' },
        bgcolor: '#252525'
      },
      showlegend: true,
      paper_bgcolor: '#252525',
      font: { color: '#e8e8e8' },
      legend: { font: { color: '#e8e8e8' } }
    }, { responsive: true });
  </script>
</body>
</html>
