<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chain Rule: Step-by-Step</title>
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["$", "$"], ["\\(", "\\)"]],
        displayMath: [["$$", "$$"], ["\\[", "\\]"]]
      },
      startup: {
        pageReady: () => MathJax.startup.defaultPageReady()
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --text: #15202b;
      --muted: #5a6b7d;
      --accent: #0d6e6e;
      --accent-soft: #d4efef;
      --border: #dce3eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      padding: 1.5rem;
      max-width: 42rem;
      margin-left: auto;
      margin-right: auto;
    }

    h1 {
      font-size: clamp(1.35rem, 3.5vw, 1.85rem);
      font-weight: 700;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1.25rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.2rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }

    label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.35rem;
      font-weight: 600;
    }

    select {
      width: 100%;
      max-width: 22rem;
      font: inherit;
      font-size: 1rem;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .steps {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .steps li {
      padding: 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }

    .steps li:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .step-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .math-block {
      font-size: 1.05rem;
    }

    .final-box {
      margin-top: 0.75rem;
      padding: 0.85rem 1rem;
      background: var(--accent-soft);
      border-radius: 8px;
      border: 1px solid rgba(13, 110, 110, 0.25);
    }

    .final-box .step-label {
      color: var(--text);
    }
  </style>
</head>
<body>
  <h1>Chain rule</h1>
  <p class="subtitle">
    Choose a composite function. The page shows $u(x)$, $f(u)$, the factors $f'(u)$ and $u'(x)$, and the combined derivative.
  </p>

  <div class="panel">
    <label for="fn-select">Composite function</label>
    <select id="fn-select" aria-label="Select composite function"></select>
    <p id="current-fn" class="math-block" style="margin: 0.75rem 0 0" aria-live="polite"></p>
  </div>

  <div class="panel">
    <ol class="steps" id="steps-root"></ol>
  </div>

  <script>
    const EXAMPLES = [
      {
        id: "sin",
        menuPlain: "y = sin(3x²)",
        menuLabel: "$y = \\sin(3x^2)$",
        y: "y = \\sin(3x^2)",
        u: "u(x) = 3x^2",
        f: "f(u) = \\sin u",
        fPrimeU: "f'(u) = \\cos u",
        uPrime: "u'(x) = 6x",
        combineWithU:
          "\\frac{dy}{dx} = f'(u)\\,u'(x) = (\\cos u)(6x) = 6x\\cos u",
        substitute:
          "\\frac{dy}{dx} = 6x\\cos(3x^2)",
        finalDisplay: "\\displaystyle \\frac{dy}{dx} = 6x\\cos(3x^2)"
      },
      {
        id: "poly",
        menuPlain: "y = (2x + 1)³",
        menuLabel: "$y = (2x+1)^3$",
        y: "y = (2x+1)^3",
        u: "u(x) = 2x+1",
        f: "f(u) = u^3",
        fPrimeU: "f'(u) = 3u^2",
        uPrime: "u'(x) = 2",
        combineWithU:
          "\\frac{dy}{dx} = f'(u)\\,u'(x) = (3u^2)(2) = 6u^2",
        substitute:
          "\\frac{dy}{dx} = 6(2x+1)^2",
        finalDisplay: "\\displaystyle \\frac{dy}{dx} = 6(2x+1)^2"
      },
      {
        id: "exp",
        menuPlain: "y = e^(x²)",
        menuLabel: "$y = e^{x^2}$",
        y: "y = e^{x^2}",
        u: "u(x) = x^2",
        f: "f(u) = e^u",
        fPrimeU: "f'(u) = e^u",
        uPrime: "u'(x) = 2x",
        combineWithU:
          "\\frac{dy}{dx} = f'(u)\\,u'(x) = (e^u)(2x) = 2x\\,e^u",
        substitute:
          "\\frac{dy}{dx} = 2x\\,e^{x^2}",
        finalDisplay: "\\displaystyle \\frac{dy}{dx} = 2x\\,e^{x^2}"
      }
    ];

    const selectEl = document.getElementById("fn-select");
    const stepsRoot = document.getElementById("steps-root");
    const currentFnEl = document.getElementById("current-fn");

    EXAMPLES.forEach((ex, i) => {
      const opt = document.createElement("option");
      opt.value = String(i);
      opt.textContent = ex.menuPlain;
      selectEl.appendChild(opt);
    });

    function renderSteps(ex) {
      const items = [
        {
          label: "Given",
          tex: `$$${ex.y}$$`
        },
        {
          label: "Inner function",
          tex: `$$${ex.u}$$`
        },
        {
          label: "Outer function",
          tex: `$$${ex.f}$$`
        },
        {
          label: "Chain rule",
          tex: `$$\\frac{dy}{dx} = f'(u)\\,u'(x)$$`
        },
        {
          label: "Outer derivative $f'(u)$",
          tex: `$$${ex.fPrimeU}$$`
        },
        {
          label: "Inner derivative $u'(x)$",
          tex: `$$${ex.uPrime}$$`
        },
        {
          label: "Multiply (still in terms of $u$ where needed)",
          tex: `$$${ex.combineWithU}$$`
        },
        {
          label: "Substitute $u = u(x)$",
          tex: `$$${ex.substitute}$$`
        }
      ];

      stepsRoot.innerHTML = items
        .map(
          (step) => `
        <li>
          <div class="step-label">${step.label}</div>
          <div class="math-block">${step.tex}</div>
        </li>
      `
        )
        .join("");

      const finalLi = document.createElement("li");
      finalLi.className = "final-box";
      finalLi.innerHTML = `
        <div class="step-label">Final answer</div>
        <div class="math-block">$$${ex.finalDisplay}$$</div>
      `;
      stepsRoot.appendChild(finalLi);
    }

    function typeset() {
      if (window.MathJax && MathJax.typesetPromise) {
        return MathJax.typesetPromise([stepsRoot, currentFnEl]);
      }
      return Promise.resolve();
    }

    function update() {
      const idx = parseInt(selectEl.value, 10);
      const ex = EXAMPLES[idx];
      currentFnEl.innerHTML = `$$${ex.menuLabel.replace(/^\$|\$$/g, "")}$$`;
      renderSteps(ex);
      return typeset();
    }

    selectEl.addEventListener("change", () => {
      update().catch((err) => console.error(err));
    });

    function whenMathJaxReady(cb) {
      if (window.MathJax && MathJax.startup && MathJax.startup.promise) {
        MathJax.startup.promise.then(cb).catch((err) => console.error(err));
      } else {
        const t = setInterval(() => {
          if (window.MathJax && MathJax.startup && MathJax.startup.promise) {
            clearInterval(t);
            MathJax.startup.promise.then(cb).catch((err) => console.error(err));
          }
        }, 50);
      }
    }

    whenMathJaxReady(() => {
      update().catch((err) => console.error(err));
    });
  </script>
</body>
</html>
